<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>九朝古都 · 河图洛书数字回溯展</title>
  
  <!-- 引入 GSAP 动画库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --obsidian: #0a0a0c;
      --earth-yellow: #c4a77d;
      --earth-light: #d4c4a0;
      --ink: rgba(230, 220, 210, 0.92);
      --ink-dim: rgba(190, 180, 165, 0.75);
      --border-subtle: rgba(180, 165, 140, 0.35);
      --gold: rgba(212, 180, 120, 0.9);
      --blood-red: rgba(170, 60, 50, 0.95);
      --white-flash: rgba(255, 255, 255, 0.98);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
      -webkit-font-smoothing: antialiased;
      background-color: var(--obsidian);
      color: var(--ink);
      transition: background-color 2.5s ease;
    }

    /* 任务一：命运暗转模式，仅改变网页底色为深红黑，不再给视频加灰色滤镜 */
    body.fate-mode { background-color: #0c0202; }

    .view { position: fixed; inset: 0; display: none; overflow: hidden; z-index: 1; }
    .view.active { display: block; }
    
    .view-transition { position: fixed; inset: 0; background: var(--white-flash); z-index: 9999; opacity: 0; visibility: hidden; pointer-events: none; }
    .view-transition.flash { opacity: 1; visibility: visible; animation: flashOut 0.6s ease 0.2s forwards; }
    @keyframes flashOut { to { opacity: 0; visibility: hidden; } }

    /* ========== 序章 ========== */
    .view-intro { background: #000; }
    #particleCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }
    .intro-layer { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .intro-layer.interactive { pointer-events: auto; }
    .intro-typewriter { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 480px; font-size: clamp(0.95rem, 3.5vw, 1.15rem); line-height: 2.2; letter-spacing: 0.2em; color: rgba(220, 210, 195, 0.95); text-align: center; min-height: 4em; }
    .intro-typewriter .line { opacity: 0; transition: opacity 0.6s ease; }
    .intro-typewriter .line.visible { opacity: 1; animation: fadeInUp 0.8s ease forwards; }
    .intro-typewriter .line.fadeout { opacity: 0; transition: opacity 0.8s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .compass-stage { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
    .compass-stage.active { display: flex; }
    .luoshu-compass { position: relative; width: min(340px, 88vw); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
    .luoshu-compass-rings { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(160, 150, 130, 0.25); box-shadow: 0 0 60px rgba(100, 140, 120, 0.08), inset 0 0 40px rgba(60, 80, 70, 0.05); }
    .luoshu-compass-rings::before { content: ''; position: absolute; inset: 8%; border-radius: 50%; border: 1px solid rgba(140, 130, 110, 0.2); }
    .tai-chi-btn { position: relative; z-index: 10; width: min(160px, 42vw); height: min(160px, 42vw); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; border: none; transition: transform 0.3s ease; }
    .tai-chi-btn:active { transform: scale(0.98); }
    .tai-chi-btn.rotating { animation: compassRotate 0.5s linear infinite; }
    .tai-chi-btn.rotating.fast { animation-duration: 0.15s; }
    @keyframes compassRotate { to { transform: rotate(360deg); } }
    .tai-chi-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(180, 160, 120, 0.4)); }
    .tai-chi-svg .yin { fill: #2a2a35; } .tai-chi-svg .yang { fill: #e8e4dc; }
    .tai-chi-svg .dot-yin { fill: #e8e4dc; } .tai-chi-svg .dot-yang { fill: #2a2a35; }
    .gua-markers { position: absolute; inset: -4%; pointer-events: none; }
    .gua-marker { position: absolute; width: 24px; height: 24px; margin: -12px 0 0 -12px; font-size: 11px; color: rgba(180, 170, 150, 0.6); display: flex; align-items: center; justify-content: center; font-weight: 500; }
    .gua-marker.highlight { color: var(--gold); text-shadow: 0 0 12px rgba(212, 180, 120, 0.8); }
    .intro-hint-press { position: absolute; bottom: 12%; font-size: clamp(12px, 3vw, 14px); letter-spacing: 0.4em; color: rgba(170, 160, 145, 0.7); animation: breathGlow 2.5s ease-in-out infinite; }
    @keyframes breathGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }


    /* ========== 任务二：全屏段落式吸附滚动 ========== */
    .view-story { position: relative; width: 100%; height: 100vh; }
    
    .story-scroll {
      position: absolute;
      inset: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-snap-type: y mandatory; /* 核心：强制垂直整屏吸附 */
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* 所有四大幕区块，严格等于屏幕高度 */
    .snap-section {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      overflow: hidden;
    }


    /* --- 第一幕：宏大叙事 --- */
    .story-prologue { position: absolute; top: 1.5rem; left: 1.5rem; right: 1.5rem; font-size: clamp(0.85rem, 2.5vw, 0.95rem); letter-spacing: 0.15em; color: var(--earth-yellow); line-height: 2; opacity: 0; transform: translateY(12px); animation: fadeInUp 0.9s ease 0.2s forwards; z-index: 10; pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
    /* 夏朝第三页仅保留视频与中部文字，去掉顶部小字 */
    body.era-xia .story-prologue { display: none; }

    .story-hero { display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem 1.5rem 5rem; }
    .image-placeholder-macro { position: absolute; inset: 0; z-index: 0; }
    
    /* 任务一：完全去除让视频变黑的滤镜，保证明亮 */
    .image-placeholder-macro video {
      width: 100%; height: 100%; object-fit: cover;
    }
    
    /* 仅在底部添加极柔和的过渡渐变，防止白色文字看不清 */
    .story-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .era-title, .era-theme, .identity-voice { position: relative; z-index: 2; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .era-title { font-size: clamp(2.2rem, 8vw, 4rem); font-weight: 500; letter-spacing: 0.3em; color: #fff; margin-bottom: 0.5rem; opacity: 0; transform: translateY(24px); animation: fadeInUp 1s ease 0.3s forwards; }
    .era-theme { font-size: clamp(0.95rem, 3.2vw, 1.2rem); letter-spacing: 0.25em; color: var(--earth-light); margin-bottom: 1.5rem; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.9s ease 0.5s forwards; }
    /* 首页文字调整为“文明锚点” */
    .identity-voice { font-size: clamp(0.95rem, 3vw, 1.05rem); line-height: 2.1; letter-spacing: 0.12em; color: var(--earth-light); max-width: 40rem; opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease 0.7s forwards; border-left: 3px solid var(--earth-yellow); padding-left: 1rem; background: rgba(0,0,0,0.3); padding-top: 0.5rem; padding-bottom: 0.5rem;}


    /* --- 任务三：第二幕 文物复原与个体故事 --- */
    .story-artifact {
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      background: #000; /* 黑屏载体 */
      padding: 0 1.5rem;
    }

    /* 承载 SVG 碎片的容器，确保不被切断 */
    #svg-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      overflow: visible;
    }
    
    #dragonSvgWrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 针对你贴进来的 SVG 做的统一限定 */
    #dragonSvgWrapper svg {
      max-width: 90%; 
      max-height: 65%; 
      width: auto;
      height: auto;
      display: block;
      overflow: visible !important;
      transform: translateY(0); /* 文物保持在屏幕中央 */
    }
    /* 夏朝第一页：文物落在上半屏 */
    body.era-xia #dragonSvgWrapper svg {
      max-height: 52%;
      transform: translate(-10vw, -19vh);
    }

    /* 默认把所有的 path 隐藏，等待 GSAP 唤醒 */
    #dragonSvgWrapper svg path { 
      opacity: 0; 
      fill: #40E0D0 !important; 
      stroke: rgba(255, 255, 255, 0.05); 
      stroke-width: 0.1; 
      filter: drop-shadow(0 0 3px #40E0D0); 
    }

    /* 第二幕文字承载面板（改为极简居中） */
    .glass-panel {
      position: relative;
      z-index: 10;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0 1.5rem;
      max-width: 720px;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
      text-align: center;
    }
    .glass-panel.visible { opacity: 1; transform: translateY(0); }

    .artifact-preline {
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      line-height: 2;
      letter-spacing: 0.12em;
      color: var(--earth-light);
      text-align: center;
      margin-bottom: 1.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.85);
    }
    .artifact-story {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem); /* 与第三页一致 */
      line-height: 2.35;
      letter-spacing: 0.12em;
      color: var(--earth-yellow); /* 与第一页金色一致 */
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .btn-identity, .btn-awaken {
      margin-top: 1.75rem;
      padding: 0.85rem 2.8rem;
      border-radius: 999px;
      border: 1px solid rgba(180,160,120,0.6);
      background: radial-gradient(circle at top, rgba(60,60,60,0.9), rgba(0,0,0,0.9));
      font-family: inherit;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      letter-spacing: 0.35em;
      color: var(--earth-light);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.35s ease;
      display: none;
    }
    .btn-identity:hover, .btn-awaken:hover {
      border-color: var(--earth-yellow);
      box-shadow: 0 0 24px rgba(64,224,208,0.45);
      color: #fff;
    }
    /* 初始仅展示“查看身份”按钮 */
    .glass-panel.show-identity .btn-identity { display: inline-block; }
    .glass-panel.show-awaken .btn-awaken { display: inline-block; }

    .artifact-fate-overlay {
      position: absolute;
      left: 50%;
      top: auto;
      bottom: 5vh;
      transform: translateX(-50%) translateY(12px);
      width: min(980px, 88vw);
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0 1rem;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .artifact-fate-overlay.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .artifact-fate-text {
      font-size: clamp(0.9rem, 2.5vw, 1.02rem);
      line-height: 2.15;
      letter-spacing: 0.1em;
      color: var(--earth-light);
      text-align: justify;
      text-justify: inter-ideograph;
      text-shadow: 0 1px 8px rgba(0,0,0,0.85);
      min-height: 5.5em;
    }


    /* --- 第三幕：命运暗转 --- */
    .story-fate {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
      background: #000 url('https://image2url.com/r2/default/images/1772043229793-95fdc6ae-74e5-4d53-8516-034afb8fcdc1.png') center center / cover no-repeat;
    }
    .story-fate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.45), rgba(0,0,0,0.85));
      pointer-events: none;
    }
    .fate-inner {
      position: relative;
      width: min(720px, 92vw);
      background: rgba(10, 10, 10, 0.78); /* 文字底衬 */
      border-radius: 12px;
      border: 1px solid rgba(196, 167, 125, 0.65);
      padding: 2rem 1.75rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.85);
    }
    .fate-text {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem);
      line-height: 2.35;
      letter-spacing: 0.12em;
      color: var(--earth-yellow); /* 与第一页金色一致 */
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 2.5s ease, transform 2.5s ease;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      text-align: justify;
    }
    .fate-text.visible { opacity: 1; transform: translateY(0); }


    /* --- 第四幕：现实锚点 --- */
    .story-anchor { display: flex; align-items: center; justify-content: center; background: transparent; }
    .geo-card { position: relative; width: min(380px, 94vw); background: linear-gradient(170deg, #2a2820, #1f1c16, #181512); border: 2px solid rgba(180,160,120,0.4); border-radius: 8px; padding: 2.5rem 1.75rem; box-shadow: 0 24px 64px rgba(0,0,0,0.8); }
    .geo-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--earth-yellow), transparent); opacity: 0.5; }
    .geo-card-header { text-align: center; padding-bottom: 1.25rem; margin-bottom: 1.25rem; border-bottom: 1px solid rgba(160,145,120,0.25); }
    .geo-card-title { font-size: clamp(0.95rem, 3vw, 1.1rem); letter-spacing: 0.45em; color: var(--ink); }
    .geo-card-seal { font-family: 'Ma Shan Zheng', serif; font-size: 1.4rem; color: var(--earth-yellow); margin-top: 0.5rem; }
    .geo-coord { font-size: clamp(0.95rem, 2.8vw, 1.05rem); line-height: 2; letter-spacing: 0.1em; color: var(--earth-light); text-align: center; }
    .btn-retry { display: block; margin: 2rem auto 0; padding: 1rem 3rem; background: linear-gradient(145deg, rgba(50,45,38,0.95), rgba(35,30,25,0.98)); border: 1px solid var(--border-subtle); border-radius: 6px; font-family: inherit; font-size: clamp(0.9rem, 2.5vw, 1rem); letter-spacing: 0.35em; color: var(--ink-dim); cursor: pointer; transition: all 0.35s ease; }
    .btn-retry:hover { background: linear-gradient(145deg, rgba(70,65,55,0.9), rgba(50,45,38,0.95)); color: var(--ink); border-color: var(--earth-yellow); }

  </style>
</head>
<body>
  <div class="view-transition" id="viewTransition"></div>

  <!-- 序章 -->
  <section class="view view-intro active" id="viewIntro">
    <canvas id="particleCanvas"></canvas>
    <div class="intro-layer" id="introTypewriterLayer">
      <div class="intro-typewriter" id="introTypewriter">
        <div class="line" id="line1"></div>
        <div class="line" id="line2"></div>
        <div class="line" id="line3"></div>
      </div>
    </div>
    <div class="compass-stage intro-layer interactive" id="compassStage">
      <div class="luoshu-compass">
        <div class="luoshu-compass-rings"></div>
        <button class="tai-chi-btn" id="taiChiBtn" type="button" aria-label="长按占卜">
          <svg class="tai-chi-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path class="yang" d="M50 5 Q85 50 50 95 Q15 50 50 5"/>
            <path class="yin" d="M50 5 Q15 50 50 95 Q85 50 50 5"/>
            <circle class="dot-yang" cx="50" cy="27" r="6"/>
            <circle class="dot-yin" cx="50" cy="73" r="6"/>
          </svg>
        </button>
        <div class="gua-markers" id="guaMarkers"></div>
      </div>
      <p class="intro-hint-press" id="introHintPress">长按阵眼，唤醒你在洛阳的前世</p>
    </div>
  </section>

  <!-- 纪传故事页 -->
  <section class="view view-story" id="viewStory">
    <div class="story-scroll" id="storyScroll">
      
      <!-- 第一幕：宏大叙事 -->
      <div class="snap-section story-hero">
        <p class="story-prologue" id="storyPrologue"></p>
        <div class="image-placeholder-macro" id="macroPlaceholder"></div>
        <h1 class="era-title" id="eraTitle"></h1>
        <p class="era-theme" id="eraTheme"></p>
        <p class="identity-voice" id="identityVoice"></p>
      </div>

      <!-- 第二幕：文物动效与个人独白（夏朝时作为新的首页） -->
      <div class="snap-section story-artifact" id="artifactSection">

    function resizeCanvas() { canvasW = canvas.width = window.innerWidth; canvasH = canvas.height = window.innerHeight; if (particles.length === 0) initParticles(); }
    function initParticles() { const count = 90; particles = []; for (let i = 0; i < count; i++) { particles.push({ x: Math.random() * canvasW, y: Math.random() * canvasH, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, size: 1 + Math.random() * 1.5, alpha: 0.3 + Math.random() * 0.5, targetIdx: i % 9, angle: Math.random() * Math.PI * 2, radius: 80 + Math.random() * 120 }); } }
    function drawParticle(p) { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(200, 220, 210, ${p.alpha})`; ctx.fill(); }
    function animateParticles() {
      ctx.fillStyle = particleMode === 'drift' ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.06)'; ctx.fillRect(0, 0, canvasW, canvasH);
      if (particleMode === 'drift') { particles.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > canvasW) p.vx *= -1; if (p.y < 0 || p.y > canvasH) p.vy *= -1; p.x = Math.max(0, Math.min(canvasW, p.x)); p.y = Math.max(0, Math.min(canvasH, p.y)); drawParticle(p); }); } 
      else if (particleMode === 'converge') { convergeProgress = Math.min(1, convergeProgress + 0.02); const cx = canvasW / 2, cy = canvasH / 2; const gridSize = Math.min(canvasW, canvasH) * 0.35; particles.forEach((p, i) => { const pos = LUOSHU_POS[p.targetIdx]; const tx = cx + (pos.x - 0.5) * gridSize * 2; const ty = cy + (pos.y - 0.5) * gridSize * 2; p.x += (tx - p.x) * 0.08; p.y += (ty - p.y) * 0.08; p.alpha = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.2; drawParticle(p); }); } 
      else if (particleMode === 'compass') { particles.forEach((p, i) => { const pos = LUOSHU_POS[p.targetIdx]; const cx = canvasW / 2, cy = canvasH / 2; const gridSize = Math.min(canvasW, canvasH) * 0.3; p.x = cx + (pos.x - 0.5) * gridSize * 2; p.y = cy + (pos.y - 0.5) * gridSize * 2; p.alpha = 0.4 + Math.sin(Date.now() * 0.002 + i * 0.5) * 0.15; drawParticle(p); }); } 
      else if (particleMode === 'storm') { stormAngle += stormSpeed; stormSpeed = Math.min(stormSpeed + 0.5, 12); const cx = canvasW / 2, cy = canvasH / 2; particles.forEach((p, i) => { const r = p.radius + Math.sin(stormAngle + i * 0.5) * 20; const a = stormAngle * 0.5 + (i / particles.length) * Math.PI * 4; p.x = cx + Math.cos(a) * r; p.y = cy + Math.sin(a) * r; p.alpha = Math.min(1, 0.5 + stormSpeed * 0.04); drawParticle(p); }); }
      requestAnimationFrame(animateParticles);
    }
    function setParticleMode(mode) { particleMode = mode; if (mode === 'converge') convergeProgress = 0; if (mode === 'storm') { stormAngle = 0; stormSpeed = 2; const cx = canvasW / 2, cy = canvasH / 2; particles.forEach((p, i) => { p.angle = (i / particles.length) * Math.PI * 2; p.radius = 60 + Math.random() * 100; p.x = cx + Math.cos(p.angle) * p.radius; p.y = cy + Math.sin(p.angle) * p.radius; }); } }

    const typewriterLines = ['伏羲一画开天，神龟浮于洛水。', '背负奇偶之数，演化天地九宫。', '华夏的密码，尽在其中'];
    function runTypewriter() {
      const lines = [document.getElementById('line1'), document.getElementById('line2'), document.getElementById('line3')];
      let idx = 0;
      function typeChar(el, text, i, onDone) { if (i > text.length) { setTimeout(() => { el.classList.add('fadeout'); setTimeout(onDone, 800); }, 2000); return; } el.textContent = text.slice(0, i); el.classList.add('visible'); setTimeout(() => typeChar(el, text, i + 1, onDone), 80); }
      function runNext() { if (idx >= 3) { document.getElementById('introTypewriterLayer').style.opacity = '0'; setTimeout(() => { phase = 2; setParticleMode('converge'); setTimeout(() => { setParticleMode('compass'); document.getElementById('compassStage').classList.add('active'); document.getElementById('introTypewriterLayer').style.display = 'none'; }, 1200); }, 600); return; } lines[idx].textContent = ''; lines[idx].classList.remove('visible', 'fadeout'); typeChar(lines[idx], typewriterLines[idx], 0, () => { idx++; runNext(); }); }
      runNext();
    }

    function initGuaMarkers() {
      const container = document.getElementById('guaMarkers');
      LUOSHU_ORDER.forEach((num, i) => { const m = document.createElement('div'); m.className = 'gua-marker'; m.textContent = num; m.dataset.num = num; const pos = LUOSHU_POS[i]; m.style.left = (pos.x * 100) + '%'; m.style.top = (pos.y * 100) + '%'; container.appendChild(m); });
    }
    initGuaMarkers();

    let holdTimer = null, isHolding = false;
    let nextNum = 1; // 测试用，固定抽中夏朝
    const taiChiBtn = document.getElementById('taiChiBtn');
    
    function onPointerDown(e) { e.preventDefault(); if (phase !== 2) return; isHolding = true; setParticleMode('storm'); taiChiBtn.classList.add('rotating'); holdTimer = setTimeout(() => taiChiBtn.classList.add('fast'), 800); }
    function onPointerUp(e) { 
      e.preventDefault(); 
      if (!isHolding) return; 
      isHolding = false; 
      if (holdTimer) clearTimeout(holdTimer); 
      taiChiBtn.classList.remove('rotating', 'fast');
      const num = 1; // 强制测试夏朝 (num = 1)
      const info = LUOSHU_MAP[num - 1];
      highlightGua(num);
      setParticleMode('compass');
      setTimeout(() => { document.getElementById('viewTransition').classList.add('flash'); setTimeout(() => { goToStory(info); }, 400); }, 600);
    }
    function highlightGua(num) { document.querySelectorAll('.gua-marker').forEach(m => { m.classList.toggle('highlight', parseInt(m.dataset.num) === num); }); }

    const viewStory = document.getElementById('viewStory');
    const storyScroll = document.getElementById('storyScroll');
    const macroPlaceholder = document.getElementById('macroPlaceholder');
    const eraTitle = document.getElementById('eraTitle');
    const eraTheme = document.getElementById('eraTheme');
    const identityVoice = document.getElementById('identityVoice');
    const artifactStory = document.getElementById('artifactStory');
    const artifactPanel = document.getElementById('artifactPanel');
    const artifactPreline = document.getElementById('artifactPreline');
    const btnIdentity = document.getElementById('btnIdentity');
    const btnAwaken = document.getElementById('btnAwaken');
    const artifactFateOverlay = document.getElementById('artifactFateOverlay');
    const artifactFateText = document.getElementById('artifactFateText');
    const storyHeroSection = storyScroll.querySelector('.story-hero');
    const artifactSection = document.getElementById('artifactSection');
    const storyAnchorSection = storyScroll.querySelector('.story-anchor');
    const storyFate = document.getElementById('storyFate');
    const fateText = document.getElementById('fateText');
    const geoCoord = document.getElementById('geoCoord');

    // 夏朝第二幕「绿松石文物粒子」效果专用状态
    let artifactSpans = [];
    let dragonPaths = [];
    let currentArtifactStoryText = '';
    let artifactAnimated = false;
    let isXia = false;
    let currentGuaInfo = null;
    let currentFateText = '';

    function typeText(el, text, speed, onDone) {
      if (!el) return;
      let idx = 0;
      el.textContent = '';
      function step() {
        if (idx > text.length) {
          if (typeof onDone === 'function') onDone();
          return;
        }
        el.textContent = text.slice(0, idx);
        idx++;
        setTimeout(step, speed);
      }
      step();
    }

    function setStorySequenceForEra() {
      if (!storyHeroSection || !artifactSection || !storyAnchorSection || !storyFate) return;
      if (isXia) {
        storyFate.style.display = 'none';
        [artifactSection, storyHeroSection, storyAnchorSection, storyFate].forEach(section => storyScroll.appendChild(section));
      } else {
        storyFate.style.display = '';
        [storyHeroSection, artifactSection, storyFate, storyAnchorSection].forEach(section => storyScroll.appendChild(section));
      }
    }

    function showXiaFateOverlay() {
      if (!isXia || !artifactFateOverlay || !artifactFateText || !currentFateText) return;
      artifactFateOverlay.classList.add('visible');
      typeText(artifactFateText, currentFateText, 35);
    }

    function prepareArtifactText() {
      const rawText = (currentArtifactStoryText || artifactStory.textContent || '').trim();
      artifactStory.innerHTML = '';
      artifactSpans = [];
      if (!rawText) return;
      Array.from(rawText).forEach(ch => {
        const span = document.createElement('span');
        span.textContent = ch;
        artifactStory.appendChild(span);
        artifactSpans.push(span);
      });
      dragonPaths = document.querySelectorAll('#dragonSvgWrapper path');
    }

    function playArtifactTextAndMorph() {
      if (!artifactSpans.length || !dragonPaths.length) return;

      const tl = gsap.timeline();

      // 夏朝：点击「唤起记忆」后直接进入加粗变色与碎片化
      if (!isXia) {
        // 其他朝代仍保留黑屏淡入的打字感受
        tl.fromTo(
          artifactSpans,
          { opacity: 0, filter: 'blur(4px)' },
          {
            opacity: 1,
            filter: 'blur(0px)',
            duration: 0.9,
            stagger: 0.05,
            ease: 'power1.out'
          }
        );
      }

      // 2. 文字整体加粗并转为绿松石色（无发光描边）
      tl.to(artifactSpans, {
        color: '#40E0D0',
        fontWeight: 600,
        textShadow: 'none',
        duration: 1.2,
        ease: 'power2.inOut'
      });

      // 3. 在当前位置将碎片拉到文字上，随后文字溃散、碎片归位成龙
      tl.add(() => {
        dragonPaths.forEach((path, i) => {
          const span = artifactSpans[i % artifactSpans.length];
          const pathRect = path.getBoundingClientRect();
          const spanRect = span.getBoundingClientRect();
          const deltaX = (spanRect.left + spanRect.width / 2) - (pathRect.left + pathRect.width / 2);
          const deltaY = (spanRect.top + spanRect.height / 2) - (pathRect.top + pathRect.height / 2);
          gsap.set(path, { x: deltaX, y: deltaY, scale: 0.1, opacity: 0 });
        });
      });

      tl.to(artifactSpans, {
        opacity: 0,
        scale: 0,
        duration: 0.7,
        stagger: { each: 0.006, from: 'start' },
        ease: 'power3.in'
      }, 'morph');

      tl.to(dragonPaths, {
        opacity: 1,
        scale: 1,
        x: 0,
        y: 0,
        duration: 3.2,
        ease: 'power4.out',
        stagger: { each: 0.001, from: 'start' }
      }, 'morph+=0.15');

      if (isXia) {
        tl.add(() => {
          showXiaFateOverlay();
        }, 'morph+=3.35');
      }
    }

    function resetArtifactState() {
      // 清空特效状态，方便下次进入二幕
      artifactSpans = [];
      dragonPaths = [];
      gsap.set('#dragonSvgWrapper path', { opacity: 0, clearProps: 'x,y,scale' });
      if (artifactFateOverlay) artifactFateOverlay.classList.remove('visible');
      if (artifactFateText) artifactFateText.textContent = '';

      if (isXia) {
        // 夏朝：第二幕作为新的首页
        if (artifactPreline && currentGuaInfo) {
          const data = ERA_DATA[currentGuaInfo.num - 1] || {};
          artifactPreline.textContent = `你的灵魂位于【${currentGuaInfo.guaName}·${currentGuaInfo.num}】，这一世你是${data.era || '夏'}朝${data.identity || '斟鄩城里的镶嵌工匠'}`;
          artifactPreline.style.display = 'block';
        }
        if (artifactStory) artifactStory.textContent = '';
        if (artifactPanel) {
          artifactPanel.classList.add('visible', 'show-identity');
          artifactPanel.classList.remove('show-awaken');
        }
        if (btnIdentity) btnIdentity.style.display = 'inline-block';
        if (btnAwaken) btnAwaken.style.display = 'none';
      } else {
        // 其他朝代保持原有逻辑：默认是纯文本，滚动到二幕才触发特效
        if (artifactPreline) artifactPreline.textContent = '';
        if (btnIdentity) btnIdentity.style.display = 'none';
        if (btnAwaken) btnAwaken.style.display = 'none';
        if (artifactPanel) artifactPanel.classList.remove('show-identity', 'show-awaken');
        if (currentArtifactStoryText) artifactStory.textContent = currentArtifactStoryText;
        if (artifactPanel) artifactPanel.classList.remove('visible');
      }
    }

    function goToStory(info) {
      currentGuaInfo = info;
      const data = ERA_DATA[info.num - 1];
      isXia = data.era === '夏';
      document.body.classList.remove('fate-mode');
      document.body.classList.toggle('era-xia', isXia);
      setStorySequenceForEra();
      document.getElementById('storyPrologue').textContent = `你的灵魂落于【${info.guaName}·${info.num}】，唤醒了【${info.eraKey}】的记忆。`;
      
      // 处理宏大叙事视频背景
      macroPlaceholder.innerHTML = '';
      if (data.macroVideo) {
        const video = document.createElement('video');
        video.src = data.macroVideo;
        video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
        macroPlaceholder.appendChild(video);
      }

      eraTitle.textContent = data.era + ' · ' + data.theme;
      // 夏朝首页去掉「斟鄩城里的镶嵌学徒」副标题，其余朝代保留
      if (data.era === '夏') {
        eraTheme.textContent = '';
        eraTheme.style.display = 'none';
      } else {
        eraTheme.style.display = '';
        eraTheme.textContent = data.identity || '';
      }
      identityVoice.textContent = data.culturalValue; // 第一屏显示文明锚点
      artifactStory.textContent = data.story; // 第二幕原始长文
      currentArtifactStoryText = data.story || '';
      currentFateText = data.fate || '';
      artifactAnimated = false;
      resetArtifactState();
      fateText.textContent = data.fate || '';
      geoCoord.textContent = data.coordinate;

      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('viewStory').classList.add('active');
      
      // 先回到顶部，再根据夏朝与否决定初始落点
      storyScroll.scrollTo(0, 0);
      
      setTimeout(() => {
        scrollReveal();
        if (!isXia) initFateObserver();
        initArtifactObserver(); // 激活第二屏特效监听
      }, 100);
    }

    // ==== 命运暗转监听 ====
    let fateObserverBound = false;
    function initFateObserver() {
      if (fateObserverBound) return;
      fateObserverBound = true;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          // 当命运区块出现 45% 时，触发暗转
          if (entry.isIntersecting) {
            document.body.classList.add('fate-mode');
          } else {
            document.body.classList.remove('fate-mode');
          }
        });
      }, { threshold: 0.45, root: storyScroll });
      observer.observe(storyFate);
    }

    // ==== 任务三：绿松石文物粒子（参考 trail.html 夏朝第二幕） ====
    let artifactObserverBound = false;
    function initArtifactObserver() {
      if (artifactObserverBound) return;
      artifactObserverBound = true;
      const artifactSection = document.getElementById('artifactSection');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            if (!artifactAnimated && !isXia) {
              // 非夏朝：滚动到第二幕时自动触发
              artifactAnimated = true;
              prepareArtifactText();
              if (artifactPanel) artifactPanel.classList.add('visible');
              playArtifactTextAndMorph();
            }
          } else {
            // 当离开第二幕时，重置状态，这样每次划回来都能重新看到“文字化龙”
            artifactAnimated = false;
            resetArtifactState();
          }
        });
      }, { threshold: 0.5, root: storyScroll }); // 当第二屏显示一半时触发
      observer.observe(artifactSection);
    }

    // ==== 基础滚动显现 ====
    function scrollReveal() {
      const triggers = storyScroll.querySelectorAll('.reveal-trigger');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.2, root: storyScroll });
      triggers.forEach(t => observer.observe(t));
    }

    // 重置逻辑
    document.getElementById('btnRetry').addEventListener('click', () => {
      document.body.classList.remove('fate-mode');
      document.body.classList.remove('era-xia');
      document.getElementById('viewTransition').classList.remove('flash');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('viewIntro').classList.add('active');
      document.getElementById('introTypewriterLayer').style.display = 'flex';
      document.getElementById('introTypewriterLayer').style.opacity = '1';
      document.getElementById('compassStage').classList.remove('active');
      phase = 1; artifactAnimated = false; isXia = false; currentGuaInfo = null;
      document.getElementById('line1').classList.remove('visible', 'fadeout');
      document.getElementById('line2').classList.remove('visible', 'fadeout');
      document.getElementById('line3').classList.remove('visible', 'fadeout');
      initParticles(); setParticleMode('drift'); runTypewriter();
    });

    // 绑定占卜按钮事件
    taiChiBtn.addEventListener('mousedown', onPointerDown);
    taiChiBtn.addEventListener('mouseup', onPointerUp);
    taiChiBtn.addEventListener('mouseleave', onPointerUp);
    taiChiBtn.addEventListener('touchstart', onPointerDown, { passive: false });
    taiChiBtn.addEventListener('touchend', onPointerUp, { passive: false });
    taiChiBtn.addEventListener('touchcancel', onPointerUp, { passive: false });

    // 夏朝第二幕交互按钮
    if (btnIdentity) {
      btnIdentity.addEventListener('click', () => {
        if (!isXia || !currentArtifactStoryText) return;
        if (artifactPanel) {
          artifactPanel.classList.remove('show-identity');
        }
        if (artifactPreline) {
          artifactPreline.textContent = '';
          artifactPreline.style.display = 'none';
        }
        btnIdentity.style.display = 'none';
        typeText(artifactStory, currentArtifactStoryText, 40, () => {
          if (artifactPanel) {
            artifactPanel.classList.add('show-awaken');
          }
          if (btnAwaken) btnAwaken.style.display = 'inline-block';
        });
      });
    }

    if (btnAwaken) {
      btnAwaken.addEventListener('click', () => {
        if (!isXia || artifactAnimated) return;
        artifactAnimated = true;
        if (artifactPanel) {
          artifactPanel.classList.remove('show-awaken');
        }
        btnAwaken.style.display = 'none';
        prepareArtifactText();
        playArtifactTextAndMorph();
      });
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); animateParticles(); runTypewriter();
  })();
  </script>
</body>
</html>
